<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Star Hotel Room Types</title>
    <style>
        /* Add some basic styling for better presentation */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .room {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            width: 300px;
            text-align: center;
            display: inline-block;
        }

        img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

    <h1> Hotel Room Types</h1>

    <div class="room">
        <img src="im" alt="Standard Room">
        <h2>Standard Room</h2>
        <p>Enjoy a comfortable stay in our standard room.</p>
        <p>Price: $150 per night</p>
    </div>

    <div class="room">
        <img src="deluxe_room.jpg" alt="Deluxe Room">
        <h2>Deluxe Room</h2>
        <p>Experience luxury in our deluxe room with additional amenities.</p>
        <p>Price: $250 per night</p>
    </div>

    <div class="room">
        <img src="suite_room.jpg" alt="Suite">
        <h2>Suite</h2>
        <p>Indulge in the ultimate luxury with our spacious suite.</p>
        <p>Price: $500 per night</p>
    </div>

</body>
</html>
